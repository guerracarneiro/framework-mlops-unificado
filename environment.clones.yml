name: mlops_clones

channels:
  - conda-forge
  - defaults

dependencies:

  # =========================
  # Python (compatibilidade garantida)
  # =========================
  - python=3.10.11

  # =========================
  # Núcleo científico
  # =========================
  - numpy=1.25.2
  - scipy=1.11.4
  - pandas=2.0.3
  - scikit-learn=1.2.2

  # =========================
  # Dependências críticas UMAP/HDBSCAN
  # =========================
  - numba=0.58.1
  - llvmlite=0.41.1

  # =========================
  # Visualização e utilitários
  # =========================
  - matplotlib=3.7.1
  - plotly=5.24.1

  - pyyaml=6.0.1
  - openpyxl=3.1.2

  - joblib=1.4.0
  - threadpoolctl=3.4.0

  - tqdm=4.66.2

  # =========================
  # Notebook (opcional mas recomendado)
  # =========================
  - jupyter
  - ipykernel

  # =========================
  # Pip (pacotes não disponíveis no conda)
  # =========================
  - pip

  - pip:
      - umap-learn==0.5.6
      - hdbscan==0.8.33
      - pynndescent==0.5.12
      - mlflow==3.8.0