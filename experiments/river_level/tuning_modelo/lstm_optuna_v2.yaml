config_base: "experiments/river_level/tuning_modelo/lstm_tuning_v1_base.yaml"

estudo:
  nome_estudo: "river_level_optuna_v2"
  direction: "minimize"
  metrica_objetivo: "melhor_val_loss"
  n_trials: 10
  timeout_segundos: null
  storage: "sqlite:///artifacts/river_level/optuna/river_level_optuna_v2.db"
  load_if_exists: true

execucao_base:
  familia_execucao: "tuning_modelo_optuna"
  baseline_referencia: "baseline_lstm"
  descricao: "Busca automatica com Optuna v2, persistencia em SQLite e pruning."

espaco_busca:
  unidades_lstm_1:
    tipo: "int"
    low: 128
    high: 192
    step: 32

  unidades_lstm_2:
    tipo: "int"
    low: 64
    high: 112
    step: 16

  dropout:
    tipo: "float"
    low: 0.05
    high: 0.20
    step: 0.05

  learning_rate:
    tipo: "float"
    low: 0.00015
    high: 0.0008
    log: true

  batch_size:
    tipo: "categorical"
    choices: [16, 32]

  peso_perda_ponderada:
    tipo: "float"
    low: 2.0
    high: 3.5
    step: 0.5

parametros_fixos:
  modelo:
    tipo_loss: "eqm_ponderado"
    limiar_perda_ponderada: 2

  treinamento:
    epochs: 50
    patience_early_stopping: 6

pruning:
  ativado: true
  n_startup_trials: 3
  n_warmup_steps: 8
  interval_steps: 2